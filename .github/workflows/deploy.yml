name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Compute SITE / BASE
        run: |
          REPO="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          OWNER_LC="${OWNER,,}"
          echo "SITE=https://${OWNER_LC}.github.io" >> "$GITHUB_ENV"
          if [[ "$REPO" == "${OWNER_LC}.github.io" ]]; then
            echo "BASE=/" >> "$GITHUB_ENV"
          else
            echo "BASE=/$REPO/" >> "$GITHUB_ENV"
          fi

      - name: Build
        run: npm run build
        env:
          SITE: ${{ env.SITE }}
          BASE: ${{ env.BASE }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
